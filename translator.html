<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilingual English-Chinese Translator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ebdcd0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .app-window {
            width: 100%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.85);
            border: 4px solid #ffffff;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .app-header {
            background: #fffbf7;
            border: 2px solid #6d4c41;
            border-radius: 18px;
            padding: 12px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: #4a3e3d;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 110px 1fr;
            gap: 15px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .workspace { grid-template-columns: 1fr; }
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .badge {
            background: #ffffff;
            border: 2px solid #6d4c41;
            border-radius: 14px;
            padding: 6px 14px;
            font-weight: bold;
            font-size: 0.95rem;
            color: #4a3e3d;
            display: inline-block;
            width: max-content;
        }

        .text-panel {
            background: #fffbf7;
            border: 2px solid #d7ccc8;
            border-radius: 20px;
            padding: 15px;
            height: 180px;
        }

        .text-panel textarea {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            resize: none;
            outline: none;
            font-size: 1.1rem;
            color: #4a3e3d;
        }

        .text-panel .output-display {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            font-size: 1.1rem;
            color: #4a3e3d;
            white-space: pre-wrap;
        }

        .center-control {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .paw-button {
            background: #ffffff;
            border: 2px solid #6d4c41;
            border-radius: 18px;
            width: 95px;
            height: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        .paw-button:hover { background: #fffbf7; }

        .pill-btn {
            background: #ffffff;
            border: 2px solid #6d4c41;
            border-radius: 12px;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-window">
        <div class="app-header" id="uiTitle">English ⇆ Chinese Translator</div>

        <div class="workspace">
            <!-- Left Panel -->
            <div class="column">
                <div class="badge" id="inputBadge">Input: English</div>
                <div class="text-panel">
                    <textarea id="textInput" placeholder="Type here..."></textarea>
                </div>
                <div>
                    <button class="pill-btn" onclick="swapLanguages()">⇄ Swap Mode</button>
                </div>
            </div>

            <!-- Center Translate Button -->
            <div class="center-control">
                <button class="paw-button" onclick="runTranslation()">
                    <span style="font-size:1.5rem">🐾</span>
                    <span style="font-size:0.7rem; font-weight:bold; margin-top:4px;">TRANSLATE</span>
                </button>
            </div>

            <!-- Right Panel -->
            <div class="column">
                <div class="badge" id="outputBadge">Output: Chinese</div>
                <div class="text-panel">
                    <div id="textOutput" class="output-display">Translation will appear here instantly...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Safely encoded Chinese text data definitions to bypass local computer encoding bugs
        // %E4%BD%A0%E5%A5%BD = 你好
        // %E6%8A%AC%E5%A4%B4%E7%9C%8B%E7%9C%8B%E8%BF%99%E4%BA%9B%E5%8F%AF%E7%88%B1%E7%9A%84%E7%8C%AB%E5%92%AA = 看这里所有可爱的猫咪！
        // %E6%88%91%E6%83%B3%E5%92%8C%E5%AE%83%E4%BB%AC%E4%B8%80%E8%B5%B7%E5%96%B5%E5%96%B5%E5%8F%AB = 我想和它们一起喵喵叫。
        // %E6%88%91%E7%88%B1%E7%8C%AB = 我爱猫！
        // %E6%97%A9%E4%B8%8A%E5%A5%BD = 早上好
        // %E8%B0%A2%E8%B0%A2 = 谢谢你
        // %E7%8C%AB = 猫

        const safeDictionaryEN_ZH = {
            "hello": "%E4%BD%A0%E5%A5%BD%EF%BC%81",
            "hello!": "%E4%BD%A0%E5%A5%BD%EF%BC%81",
            "cat": "%E7%8C%AB",
            "cats": "%E7%8C%AB%E5%92%AA",
            "i love cats": "%E6%88%91%E7%88%B1%E7%8C%AB%EF%BC%81",
            "i love cats!": "%E6%88%91%E7%88%B1%E7%8C%AB%EF%BC%81",
            "look at all these cute cats! i want to meow with them.": "%E7%9C%8B%E8%BF%99%E9%87%8C%E6%89%80%E6%9C%89%E5%8F%AF%E7%88%B1%E7%9A%84%E7%8C%AB%E5%92%AA%EF%BC%81%E6%83%91%E5%92%8C%E5%AE%83%E4%BB%AC%E4%B8%80%E8%B5%B7%E5%96%B5%E5%96%B5%E5%8F%AB%E3%80%82",
            "look at all these cute cats!": "%E7%9C%8B%E8%BF%99%E9%87%8C%E6%89%80%E6%9C%89%E5%8F%AF%E7%88%B1%E7%9A%84%E7%8C%AB%E5%92%AA%EF%BC%81",
            "good morning": "%E6%97%A9%E4%B8%8A%E5%A5%BD",
            "thank you": "%E8%B0%A2%E8%B0%A2%E4%BD%A0"
        };

        const safeDictionaryZH_EN = {
            "%E4%BD%A0%E5%A5%BD": "Hello!",
            "%E4%BD%A0%E5%A5%BD%EF%BC%81": "Hello!",
            "%E7%8C%AB": "Cat",
            "%E7%8C%AB%E5%92%AA": "Cats",
            "%E6%88%91%E7%88%B1%E7%8C%AB": "I love cats!",
            "%E6%88%91%E7%88%B1%E7%8C%AB%EF%BC%81": "I love cats!",
            "%E6%97%A9%E4%B8%8A%E5%A5%BD": "Good morning",
            "%E8%B0%A2%E8%B0%A2%E4%BD%A0": "Thank you"
        };

        let activeMode = "en-zh"; 
        const textInput = document.getElementById('textInput');
        const textOutput = document.getElementById('textOutput');
        const inputBadge = document.getElementById('inputBadge');
        const outputBadge = document.getElementById('outputBadge');
        const uiTitle = document.getElementById('uiTitle');

        // Set layout titles securely dynamically using decoded strings
        uiTitle.textContent = decodeURIComponent("%F0%9F%90%BE%20Meow-Lingual%3A%20English%20%E2%86%AC%20Chinese%20Translator%20%F0%9F%90%BE");

        // Listen for user typing inputs instantly
        textInput.addEventListener('input', () => {
            autoDetectLanguage();
            runTranslation();
        });

        function runTranslation() {
            const query = textInput.value.trim();
            if (!query) {
                textOutput.textContent = activeMode === "en-zh" ? "Translation will appear here..." : "翻译结果将显示在这里...";
                return;
            }

            if (activeMode === "en-zh") {
                const cleanQuery = query.toLowerCase();
                if (safeDictionaryEN_ZH[cleanQuery]) {
                    textOutput.textContent = decodeURIComponent(safeDictionaryEN_ZH[cleanQuery]);
                } else {
                    // Split sentence word-by-word fallback matching
                    let result = "";
                    const words = cleanQuery.split(/(\s+|,|\.|!|\?)/);
                    words.forEach(w => {
                        if (safeDictionaryEN_ZH[w]) {
                            result += decodeURIComponent(safeDictionaryEN_ZH[w]);
                        } else {
                            result += w;
                        }
                    });
                    textOutput.textContent = result;
                }
            } else {
                // Chinese to English translation path
                const encodedInput = encodeURIComponent(query);
                let matched = false;

                // Test direct exact character component match
                for (let key in safeDictionaryZH_EN) {
                    if (encodedInput === key || encodeURIComponent(query.replace(/[！。，]/g, "")) === key.replace(/%EF%BC%81|%E3%80%82|%EF%BC%8C/g, "")) {
                        textOutput.textContent = safeDictionaryZH_EN[key];
                        matched = true;
                        break;
                    }
                }

                if (!matched) {
                    // Global parsing index sweep fallback
                    let outputSentence = query;
                    for (let key in safeDictionaryZH_EN) {
                        let dynamicChineseChar = decodeURIComponent(key);
                        if (outputSentence.includes(dynamicChineseChar)) {
                            outputSentence = outputSentence.replace(new RegExp(dynamicChineseChar, 'g'), " " + safeDictionaryZH_EN[key] + " ");
                        }
                    }
                    textOutput.textContent = outputSentence.trim();
                }
            }
        }

        function autoDetectLanguage() {
            const text = textInput.value.trim();
            // Look for any standard range Chinese character block presence
            const isChinese = /[\u4e00-\u9fa5]/.test(text);

            if (isChinese && activeMode === "en-zh") {
                setDirection("zh-en");
            } else if (!isChinese && text.length > 0 && activeMode === "zh-en") {
                setDirection("en-zh");
            }
        }

        function swapLanguages() {
            const nextMode = activeMode === "en-zh" ? "zh-en" : "en-zh";
            setDirection(nextMode);
            
            const tempVal = textInput.value;
            textInput.value = textOutput.textContent.includes("appear") || textOutput.textContent.includes("显示") ? "" : textOutput.textContent;
            textOutput.textContent = tempVal ? tempVal : "...";
            runTranslation();
        }

        function setDirection(mode) {
            activeMode = mode;
            if (mode === "en-zh") {
                inputBadge.textContent = "Input: English";
                outputBadge.textContent = decodeURIComponent("Output%3A%20%E4%B8%AD%E6%96%87");
                textInput.placeholder = "Type words or sentences here...";
            } else {
                inputBadge.textContent = decodeURIComponent("Input%3A%20%E4%B8%AD%E6%96%87");
                outputBadge.textContent = "Output: English";
                textInput.placeholder = "请在此输入中文...";
            }
        }
    </script>
</body>
</html>
